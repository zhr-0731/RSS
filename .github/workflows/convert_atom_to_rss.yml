name: Convert Atom Feeds to RSS 2.0

on:
  schedule:
    - cron: '0 2,14 * * *'
  workflow_dispatch:

permissions:
  contents: write   # 关键：授予写入权限

jobs:
  convert-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser PyRSS2Gen requests beautifulsoup4

      - name: Run Atom conversion script
        run: python scripts/convert_atom_to_rss.py

      - name: Run Hedwig RSS script
        run: python scripts/hedwig_to_rss.py

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update RSS feeds [skip ci]"
          git push
